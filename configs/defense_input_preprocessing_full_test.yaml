experiment_name: 03_defense_input_preprocessing_full_test_key_configs
seed: 42

data:
  dataset: GTSRB
  root: data/raw
  image_size: 64
  batch_size: 128
  num_workers: 4
  max_eval_samples: 0
  download: false

model:
  checkpoint: results/01_baseline/resnet18/checkpoints/best_model.pth

attacks:
  fgsm:
    epsilons: [0.03]
  pgd:
    epsilons: [0.03]
    alpha: 0.005
    steps: 7

defenses:
  jpeg_compression:
    quality: 75

outputs:
  result_dir: results/03_defense/input_preprocessing_full_test
  report_figure_dir: reports/figures
  report_table_dir: reports/tables
  max_cases_per_grid: 9
