experiment_name: 02_attack_fgsm_pgd
seed: 42

data:
  dataset: GTSRB
  root: data/raw
  image_size: 64
  batch_size: 128
  num_workers: 4
  max_eval_samples: 3000

model:
  checkpoint: results/01_baseline/resnet18/checkpoints/best_model.pth

attacks:
  fgsm:
    epsilons: [0.005, 0.01, 0.02, 0.03, 0.05]
  pgd:
    epsilons: [0.005, 0.01, 0.02, 0.03, 0.05]
    alpha: 0.005
    steps: 7

outputs:
  result_dir: results/02_attack/fgsm_pgd
  report_figure_dir: reports/figures
  report_table_dir: reports/tables
  max_cases_per_grid: 12
  save_adversarial_grid: true
  save_noise_map: true
  save_confidence_bar: true
  save_attack_curve: true
