experiment_name: 04_per_class_failure_analysis
seed: 42

data:
  dataset: GTSRB
  root: data/raw
  image_size: 64
  batch_size: 128
  num_workers: 4
  selected_indices: results/02_attack/fgsm_pgd/metrics/selected_eval_indices.csv
  max_eval_samples: 3000

model:
  checkpoint: results/01_baseline/resnet18/checkpoints/best_model.pth

attack:
  method: pgd
  epsilon: 0.03
  alpha: 0.005
  steps: 7

defense:
  method: jpeg_compression
  quality: 75

outputs:
  result_dir: results/04_extended_analysis/per_class_failure_analysis
  report_figure_dir: reports/figures
  report_table_dir: reports/tables
  max_failure_cases: 9
